<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SimpleCRM Demo - Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <div>
        <h1>SimpleCRM Dashboard</h1>
        <p class="subtitle">Manage and track your leads in a simple workflow.</p>
      </div>
      <a class="btn" href="/add.html">Add Lead</a>
    </header>

    <section class="card">
      <h2>All Leads</h2>
      <div id="message" class="message" aria-live="polite"></div>
      <div id="empty-state" class="empty-state" hidden>
        <p>No leads yet.</p>
        <p>Click <strong>Add Lead</strong> to create your first one.</p>
      </div>
      <div class="table-wrap">
        <table id="leads-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Created At</th>
              <th>Updated At</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="leads-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/main.js"></script>
  <script>
    const tbody = document.getElementById('leads-body');
    const leadsTable = document.getElementById('leads-table');
    const emptyState = document.getElementById('empty-state');
    const message = document.getElementById('message');

    async function loadLeads() {
      try {
        const leads = await window.SimpleCRM.fetchLeads();

        if (!Array.isArray(leads) || leads.length === 0) {
          tbody.innerHTML = '';
          leadsTable.hidden = true;
          emptyState.hidden = false;
          return;
        }

        leadsTable.hidden = false;
        emptyState.hidden = true;
        tbody.innerHTML = leads
          .map((lead) => `
            <tr>
              <td>${lead.name}</td>
              <td><span class="status status-${lead.status.toLowerCase()}">${lead.status}</span></td>
              <td>${window.SimpleCRM.formatDate(lead.created_at)}</td>
              <td>${window.SimpleCRM.formatDate(lead.updated_at)}</td>
              <td><a class="btn-link" href="/edit.html?id=${lead.id}">Edit</a></td>
            </tr>
          `)
          .join('');
      } catch (error) {
        message.textContent = error.message;
        message.classList.add('error');
      }
    }

    loadLeads();
  </script>
</body>
</html>
